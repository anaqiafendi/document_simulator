name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false  # We'll handle LFS ourselves after migration

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Build React webapp
        run: |
          cd webapp
          npm ci
          npm run build

      - name: Deploy to Hugging Face Spaces via Hub API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          pip install huggingface_hub
          python - << 'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = f"{os.environ['HF_USERNAME']}/{os.environ['HF_SPACE_NAME']}"
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[
                  ".git",
                  ".git/**",
                  ".venv",
                  ".venv/**",
                  "__pycache__",
                  "**/__pycache__/**",
                  "node_modules",
                  "node_modules/**",
                  "webapp/.vite/deps/**",
                  "webapp/dist", "webapp/dist/**",
                  "*.pyc",
                  "augraphy_cache/**",
              ],
              commit_message="deploy: sync from GitHub main",
          )
          # Upload pre-built React SPA as webapp_dist/ (bypasses gitignore filter).
          # Non-fatal: if HF returns a transient 5xx the previous webapp_dist
          # remains in the Space so the Docker build still succeeds.
          try:
              api.upload_folder(
                  folder_path="webapp/dist",
                  path_in_repo="webapp_dist",
                  repo_id=repo_id,
                  repo_type="space",
                  commit_message="deploy: pre-built webapp_dist",
              )
              print("webapp_dist uploaded successfully")
          except Exception as e:
              print(f"WARNING: webapp_dist upload failed (non-fatal, using previous): {e}")
          print("Deploy complete.")
          EOF
